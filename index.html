<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30X AI Sales · Dashboard de Leads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #141414;
    --bg-card: #16181a;
    --border: #232527;
    --border-hover: #3a3d40;
    --text: #f5f5f5;
    --text-dim: #8b8d90;
    --text-faint: #5a5d60;
    --lime: #c7f352;
    --lime-dark: #9bc63d;
    --hot: #ff4d4d;
    --warm: #ff9933;
    --cold: #4d9fff;
    --neutral: #6b6e72;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', -apple-system, sans-serif;
    font-weight: 400;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 15% 10%, rgba(199,243,82,.05), transparent 50%),
      radial-gradient(circle at 85% 90%, rgba(199,243,82,.03), transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header { margin-bottom: 48px; }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
  }
  .brand-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--lime);
    box-shadow: 0 0 12px var(--lime);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  h1 em {
    font-style: italic;
    color: var(--lime);
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 16px;
    max-width: 600px;
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin: 40px 0 32px;
    overflow: hidden;
  }
  .stat {
    background: var(--bg-elev);
    padding: 24px;
    transition: background .2s;
  }
  .stat:hover { background: var(--bg-card); }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: 'Instrument Serif', serif;
    font-size: 44px;
    line-height: 1;
    font-weight: 400;
  }
  .stat.hot .stat-value { color: var(--hot); }
  .stat.warm .stat-value { color: var(--warm); }
  .stat.cold .stat-value { color: var(--cold); }
  .stat.attended .stat-value { color: var(--lime); }
  .stat-sub {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* FILTERS */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    padding: 16px 0;
    margin-bottom: 24px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .search {
    flex: 1;
    min-width: 240px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
    transition: border-color .15s;
  }
  .search:focus { outline: none; border-color: var(--lime); }
  .chip {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--border-hover); color: var(--text); }
  .chip.active {
    background: var(--lime);
    color: var(--bg);
    border-color: var(--lime);
  }
  .chip[data-filter="HOT"].active    { background: var(--hot); border-color: var(--hot); color: #fff; }
  .chip[data-filter="WARM"].active   { background: var(--warm); border-color: var(--warm); color: #000; }
  .chip[data-filter="COLD"].active   { background: var(--cold); border-color: var(--cold); color: #fff; }
  .chip[data-filter="NEUTRAL"].active{ background: var(--neutral); border-color: var(--neutral); color: #fff; }
  .results-count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--neutral);
  }
  .card[data-nivel="HOT"]::before    { background: var(--hot); }
  .card[data-nivel="WARM"]::before   { background: var(--warm); }
  .card[data-nivel="COLD"]::before   { background: var(--cold); }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .card-name {
    font-weight: 500;
    font-size: 15px;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }
  .badge.HOT     { background: rgba(255,77,77,.15);  color: var(--hot);  border: 1px solid rgba(255,77,77,.3); }
  .badge.WARM    { background: rgba(255,153,51,.15); color: var(--warm); border: 1px solid rgba(255,153,51,.3); }
  .badge.COLD    { background: rgba(77,159,255,.15); color: var(--cold); border: 1px solid rgba(77,159,255,.3); }
  .badge.NEUTRAL { background: rgba(107,110,114,.15);color: var(--neutral); border: 1px solid rgba(107,110,114,.3); }
  .badge.attended { background: rgba(199,243,82,.15); color: var(--lime); border: 1px solid rgba(199,243,82,.3); }

  .card-question {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    flex: 1;
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 12px;
  }
  .card-question.empty {
    color: var(--text-faint);
    font-style: italic;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .card-channel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .card-cta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--lime);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* MODAL */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    z-index: 100;
    overflow-y: auto;
    animation: fadeIn .2s ease;
  }
  .modal-bg.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-width: 720px;
    width: 100%;
    padding: 32px;
    animation: slideUp .3s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 20px;
  }
  .modal-name {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    line-height: 1.2;
  }
  .modal-meta {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 4px;
  }
  .modal-close {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all .15s;
  }
  .modal-close:hover { color: var(--text); border-color: var(--border-hover); }

  .modal-section {
    margin: 24px 0;
  }
  .modal-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    margin-bottom: 10px;
  }
  .modal-question {
    background: var(--bg-elev);
    border-left: 3px solid var(--border);
    padding: 14px 18px;
    border-radius: 4px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }
  .modal-question[data-nivel="HOT"]  { border-left-color: var(--hot); }
  .modal-question[data-nivel="WARM"] { border-left-color: var(--warm); }
  .modal-question[data-nivel="COLD"] { border-left-color: var(--cold); }

  .modal-response {
    background: linear-gradient(180deg, rgba(199,243,82,.05), transparent);
    border: 1px solid rgba(199,243,82,.2);
    border-radius: 4px;
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
  }

  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 20px;
  }
  .btn {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    text-decoration: none;
    text-align: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:hover { border-color: var(--border-hover); background: var(--bg-card); }
  .btn-primary {
    background: var(--lime);
    color: var(--bg);
    border-color: var(--lime);
    grid-column: 1 / -1;
    font-weight: 600;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 14px;
  }
  .btn-primary:hover { background: var(--lime-dark); border-color: var(--lime-dark); }
  .btn-primary:disabled { opacity: .5; cursor: wait; }

  .notes {
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    min-height: 60px;
  }
  .notes:focus { outline: none; border-color: var(--lime); }

  .proposal-box {
    margin-top: 16px;
    background: var(--bg-elev);
    border: 1px solid var(--lime);
    border-radius: 4px;
    padding: 16px;
    display: none;
  }
  .proposal-box.show { display: block; animation: slideUp .3s ease; }
  .proposal-text {
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    color: var(--text);
    margin-bottom: 12px;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(10,10,10,.3);
    border-top-color: var(--bg);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--lime);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    transition: transform .25s cubic-bezier(.16,1,.3,1);
    z-index: 200;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .load-more {
    display: block;
    margin: 32px auto;
    padding: 14px 32px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    border-radius: 4px;
    transition: all .15s;
  }
  .load-more:hover { border-color: var(--lime); color: var(--lime); }

  @media (max-width: 600px) {
    .container { padding: 20px 16px 60px; }
    .stat-value { font-size: 32px; }
    .modal { padding: 24px 20px; }
    .modal-actions { grid-template-columns: 1fr; }
  }
</style>
</head>

aje estructurada o el conjunto de habilidades (skills) que un SDR debe dominar usando IA para asegurar una transición exitosa y rápida a un rol de Account Executive?\n\nPensando en el futuro de las ventas impulsadas por tecnología algorítmica, ¿qué carreras de pregrado o disciplinas académicas consideras que preparan mejor a un profesional para entender tanto la psicología del comprador como el análisis de datos?\n\n¿Cómo visualizas que cambiará la carga de trabajo diaria de un SDR y un AE en los próximos 3 años debido a la automatización extrema? ¿Qué tareas desaparecerán por completo?\n\n¿Cómo evitamos que el alcance (outreach) generado por IA suene robótico o genérico? ¿Cuál es el límite ideal entre la automatización y el toque humano?\n\n¿Qué herramientas o prompts de IA recomiendas para que los SDR y AE tengan battle cards (tarjetas de batalla) dinámicas que les ayuden a manejar objeciones en frío en tiempo real durante una llamada?\n\nSi todos nuestros competidores comienzan a usar IA para enviar miles de correos hiper-personalizados, ¿cuál será el verdadero factor diferenciador para conseguir una reunión con un cliente B2B de alto valor?\n\n¿Cuál es la mejor estrategia para implementar herramientas de IA en un equipo de ventas veterano que se resiste a cambiar sus métodos tradicionales?\n\nAl utilizar modelos de lenguaje (LLMs) para analizar correos y contratos de clientes, ¿cuáles son las mejores prácticas para evitar filtraciones de datos sensibles de la empresa?\n\n¿Cómo podemos usar la IA para crear un modelo de calificación de leads (Lead Scoring) que identifique la verdadera intención de compra en lugar de solo medir si abrieron un correo?\n\n¿Cómo nos aseguramos de que las herramientas de IA no hereden sesgos que nos hagan descartar prospectos que en realidad son oportunidades rentables?\n\n¿De qué manera específica puede la IA cerrar la brecha histórica entre lo que Marketing considera un 'buen lead' y lo que Ventas necesita para cerrar?\n\n¿Tienes al // ============ ESTADO ============
let currentFilter = "ALL";
let currentSearch = "";
let pageSize = 60;
let displayed = pageSize;

// Orden: HOT > WARM > COLD > NEUTRAL, y dentro asistieron primero
const ORDER = {HOT:0, WARM:1, COLD:2, NEUTRAL:3};
LEADS.sort((a,b) => {
  const o = ORDER[a.i] - ORDER[b.i];
  if (o !== 0) return o;
  return (b.a === "Si" ? 1 : 0) - (a.a === "Si" ? 1 : 0);
});

// ============ STATS ============
function paintStats() {
  document.getElementById("stat-total").textContent = LEADS.length.toLocaleString("es");
  document.getElementById("stat-hot").textContent = LEADS.filter(l => l.i === "HOT").length;
  document.getElementById("stat-warm").textContent = LEADS.filter(l => l.i === "WARM").length;
  document.getElementById("stat-cold").textContent = LEADS.filter(l => l.i === "COLD").length;
  document.getElementById("stat-attended").textContent = LEADS.filter(l => l.a === "Si").length;
}
paintStats();

// ============ FILTRADO ============
function getFiltered() {
  const q = currentSearch.toLowerCase();
  return LEADS.filter(l => {
    if (currentFilter === "ATTENDED" && l.a !== "Si") return false;
    if (["HOT","WARM","COLD","NEUTRAL"].includes(currentFilter) && l.i !== currentFilter) return false;
    if (q) {
      const hay = (l.n + " " + l.c + " " + l.r + " " + l.q).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// ============ RENDER ============
function escape(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderCards() {
  const filtered = getFiltered();
  const grid = document.getElementById("grid");
  const slice = filtered.slice(0, displayed);

  grid.innerHTML = slice.map((l, idx) => {
    const isEmpty = l.q === "[VACIO]";
    const qDisplay = isEmpty ? "Sin pregunta del formulario" : (l.q.length > 140 ? l.q.slice(0,140) + "..." : l.q);
    const attended = l.a === "Si" ? '<span class="badge attended">Asistió</span>' : '';
    return `
      <div class="card" data-nivel="${l.i}" data-idx="${idx}" onclick="openModal(${LEADS.indexOf(l)})">
        <div class="card-head">
          <div>
            <div class="card-name">${escape(l.n)}</div>
            <div class="card-meta">${escape(l.c || "—")} · ${escape(l.r || "—")}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
            <span class="badge ${l.i}">${l.i}</span>
            ${attended}
          </div>
        </div>
        <div class="card-question ${isEmpty ? 'empty':''}">${escape(qDisplay)}</div>
        <div class="card-footer">
          <span class="card-channel">${escape(l.u || "direct")}</span>
          <span class="card-cta">Ver detalle →</span>
        </div>
      </div>`;
  }).join("");

  document.getElementById("results-count").textContent = `${filtered.length.toLocaleString("es")} resultado${filtered.length !== 1 ? 's' : ''}`;
  const lm = document.getElementById("load-more");
  lm.style.display = filtered.length > displayed ? "block" : "none";
}

// ============ MODAL ============
function openModal(idx) {
  const l = LEADS[idx];
  const isEmpty = l.q === "[VACIO]";
  const mailtoBody = encodeURIComponent(l.p);
  const mailtoSubject = encodeURIComponent(`${l.n.split(" ")[0]}, respuesta a tu pregunta del webinar 30X AI Sales`);
  const waMessage = encodeURIComponent(`Hola ${l.n.split(" ")[0]}, soy del equipo de 30X. ${l.p}`);
  const waNumber = (l.t || "").replace(/[^\d]/g, "");
  const noteKey = `note_${l.e}`;
  const savedNote = localStorage.getItem(noteKey) || "";

  const modal = document.getElementById("modal");
  modal.innerHTML = `
    <div class="modal-head">
      <div>
        <div class="modal-name">${escape(l.n)}</div>
        <div class="modal-meta">${escape(l.c || "—")} · ${escape(l.r || "—")}</div>
        <div class="modal-meta" style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:12px;">
          ${escape(l.e)} ${l.t ? '· ' + escape(l.t) : ''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <span class="badge ${l.i}">${l.i}</span>
        ${l.a === "Si" ? '<span class="badge attended">Asistió</span>' : ''}
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Pregunta del formulario</div>
      <div class="modal-question" data-nivel="${l.i}">
        ${isEmpty ? '<em style="color:var(--text-faint)">No completó la pregunta del formulario.</em>' : escape(l.q)}
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Respuesta personalizada pre-generada</div>
      <div class="modal-response" id="response-text">${escape(l.p)}</div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" id="btn-generate" onclick="generateProposal(${idx})">
        Generar propuesta nueva en vivo
      </button>
      <button class="btn" onclick="copyText(LEADS[${idx}].p)">Copiar respuesta</button>
      <a class="btn" href="mailto:${l.e}?subject=${mailtoSubject}&body=${mailtoBody}" target="_blank">Abrir en Gmail</a>
      ${waNumber ? `<a class="btn" href="https://wa.me/${waNumber}?text=${waMessage}" target="_blank" style="grid-column:1/-1">Abrir en WhatsApp</a>` : ''}
    </div>

    <div class="proposal-box" id="proposal-box">
      <div class="modal-label" style="color:var(--lime)">Propuesta generada en vivo</div>
      <div class="proposal-text" id="proposal-text"></div>
      <button class="btn" onclick="copyText(document.getElementById('proposal-text').textContent)" style="width:100%">Copiar propuesta</button>
    </div>

    <div class="modal-section">
      <div class="modal-label">Notas internas (se guardan en este navegador)</div>
      <textarea class="notes" id="notes" placeholder="Notas privadas sobre este lead..." oninput="localStorage.setItem('${noteKey}', this.value)">${escape(savedNote)}</textarea>
    </div>

    <button class="btn" onclick="closeModal()" style="width:100%;margin-top:16px">Cerrar</button>
  `;

  document.getElementById("modal-bg").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-bg").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("modal-bg").addEventListener("click", (e) => {
  if (e.target.id === "modal-bg") closeModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

// ============ COPY ============
function copyText(t) {
  navigator.clipboard.writeText(t).then(() => {
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1500);
  });
}
